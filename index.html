    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        
        /* Loading overlay for better UX */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #F1592A, #FA662A);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
            color: white;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 10px;
        }
        
        .loading-subtext {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .iframe-container {
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .iframe-container.loaded {
            opacity: 1;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        
        /* Permission request overlay */
        .permission-overlay {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            z-index: 10000;
            display: none;
            max-width: 400px;
            margin: 0 auto;
        }
        
        .permission-overlay.active {
            display: block;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .permission-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .permission-icon {
            width: 50px;
            height: 50px;
            background: #f0f0f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .permission-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        
        .permission-text {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        
        .permission-buttons {
            display: flex;
            gap: 10px;
        }
        
        .permission-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .permission-btn.allow {
            background: #F1592A;
            color: white;
        }
        
        .permission-btn.allow:hover {
            background: #e04d1e;
            transform: translateY(-2px);
        }
        
        .permission-btn.deny {
            background: #f0f0f0;
            color: #666;
        }
        
        .permission-btn.deny:hover {
            background: #e0e0e0;
        }
        
        /* Network status */
        .network-status {
            position: fixed;
            top: 10px;
            left: 10px;
            right: 10px;
            background: #dc3545;
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            z-index: 10001;
            display: none;
        }
        
        .network-status.show {
            display: block;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from { transform: translateY(-100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        /* Responsive */
        @media (max-width: 480px) {
            .permission-overlay {
                left: 10px;
                right: 10px;
                bottom: 10px;
            }
            
            .permission-buttons {
                flex-direction: column;
            }
        }

<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">

    <div class="network-status" id="networkStatus">

    <!-- Permission Request Overlay -->
    <div class="permission-overlay" id="permissionOverlay">
        <div class="permission-header">
            <div class="permission-icon">📸</div>
            <div class="permission-title">Camera & File Access</div>
        </div>
        <div class="permission-text">
            Sohojatri needs access to your camera and files to:
            <ul style="margin-top: 10px; padding-left: 20px;">
                <li>Capture and upload NID documents</li>
                <li>Take photos of invoices</li>
                <li>Upload files for registration</li>
            </ul>
        </div>
        <div class="permission-buttons">
            <button class="permission-btn allow" onclick="requestPermissions()">
                Allow Access
            </button>
            <button class="permission-btn deny" onclick="hidePermissionOverlay()">
                Not Now
            </button>
        </div>
    </div>
    
    <!-- Iframe Container -->
    <div class="iframe-container" id="iframeContainer">
        <iframe 
            id="mainIframe"
            src="https://script.google.com/macros/s/AKfycbzyQfAB6F1ydo5R1FcZsHt-wSD9OgWxw7t33jHjQVtObr5XuMaCuD8FTjYSVilMRIncgQ/exec"
            allow="camera *; microphone *; clipboard-read *; clipboard-write *; display-capture *"
            allowfullscreen
            webkitallowfullscreen
            mozallowfullscreen
            loading="lazy"
            importance="high"
            referrerpolicy="strict-origin-when-cross-origin"
            sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-downloads allow-presentation allow-top-navigation"
        ></iframe>

    <script>
        // Wait for iframe to load
        const iframe = document.getElementById('mainIframe');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const iframeContainer = document.getElementById('iframeContainer');
        const permissionOverlay = document.getElementById('permissionOverlay');
        const networkStatus = document.getElementById('networkStatus');
        
        // Check if permissions were previously requested
        const permissionsRequested = localStorage.getItem('permissionsRequested');
        
        // Show permission overlay if not previously requested
        if (!permissionsRequested) {
            setTimeout(() => {
                permissionOverlay.classList.add('active');
            }, 2000);
        }
        
        // Iframe load event
        iframe.addEventListener('load', function() {
            // Hide loading overlay
            loadingOverlay.style.opacity = '0';
            setTimeout(() => {
                loadingOverlay.style.display = 'none';
                iframeContainer.classList.add('loaded');
            }, 500);
            
            // Try to request permissions through iframe
            try {
                iframe.contentWindow.postMessage({
                    type: 'REQUEST_PERMISSIONS',
                    permissions: ['camera', 'microphone', 'clipboard']
                }, '*');
            } catch (e) {
                console.log('Could not post message to iframe:', e);
            }
        });
        
        // Error handling for iframe
        iframe.addEventListener('error', function() {
            loadingOverlay.innerHTML = `
                <div style="text-align: center;">
                    <div style="font-size: 48px; margin-bottom: 20px;">⚠️</div>
                    <div class="loading-text">Failed to load</div>
                    <div class="loading-subtext">Please check your connection and refresh</div>
                    <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 30px; background: white; color: #F1592A; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">
                        Refresh
                    </button>
                </div>
            `;
        });
        
        // Network status monitoring
        window.addEventListener('online', function() {
            networkStatus.classList.remove('show');
            // Reload if iframe failed to load
            if (iframeContainer.classList.contains('loaded') === false) {
                location.reload();
            }
        });
        
        window.addEventListener('offline', function() {
            networkStatus.classList.add('show');
        });
        
        // Request permissions function
        function requestPermissions() {
            // Hide overlay
            hidePermissionOverlay();
            
            // Store that permissions were requested
            localStorage.setItem('permissionsRequested', 'true');
            
            // Request camera permission
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: true, audio: false })
                    .then(function(stream) {
                        console.log('Camera permission granted');
                        stream.getTracks().forEach(track => track.stop());
                        
                        // Show success message
                        showToast('Camera access granted!', 'success');
                    })
                    .catch(function(err) {
                        console.log('Camera permission denied or error:', err);
                        showToast('Camera access is optional. You can enable it later in browser settings.', 'info');
                    });
            }
            
            // Request file access (modern browsers handle this automatically when input is clicked)
            // We'll test file input
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = 'image/*';
            fileInput.style.display = 'none';
            document.body.appendChild(fileInput);
            
            // Simulate click to trigger permission prompt (if any)
            setTimeout(() => {
                fileInput.click();
                setTimeout(() => {
                    document.body.removeChild(fileInput);
                }, 1000);
            }, 500);
            
            // Try to wake up the device (mobile optimization)
            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen').catch(e => console.log('Wake lock not available:', e));
            }
        }
        
        // Hide permission overlay
        function hidePermissionOverlay() {
            permissionOverlay.classList.remove('active');
            localStorage.setItem('permissionsRequested', 'true');
        }
        
        // Show toast message
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 80px;
                left: 20px;
                right: 20px;
                background: ${type === 'success' ? '#28a745' : '#17a2b8'};
                color: white;
                padding: 15px;
                border-radius: 10px;
                text-align: center;
                font-size: 14px;
                z-index: 10002;
                animation: slideUp 0.3s ease;
                max-width: 400px;
                margin: 0 auto;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(100px)';
                setTimeout(() => document.body.removeChild(toast), 300);
            }, 3000);
        }
        
        // Handle messages from iframe
        window.addEventListener('message', function(event) {
            // Verify origin for security (adjust as needed)
            // if (event.origin !== 'https://script.google.com') return;
            
            if (event.data && event.data.type === 'PERMISSION_NEEDED') {
                permissionOverlay.classList.add('active');
            }
            
            if (event.data && event.data.type === 'PERMISSION_GRANTED') {
                showToast('Permission granted!', 'success');
            }
        });
        
        // Preload and optimize
        window.addEventListener('load', function() {
            // Set iframe importance
            iframe.setAttribute('importance', 'high');
            
            // Preconnect to Google domains
            const preconnect = document.createElement('link');
            preconnect.rel = 'preconnect';
            preconnect.href = 'https://script.google.com';
            document.head.appendChild(preconnect);
            
            // DNS prefetch
            const dnsPrefetch = document.createElement('link');
            dnsPrefetch.rel = 'dns-prefetch';
            dnsPrefetch.href = 'https://script.google.com';
            document.head.appendChild(dnsPrefetch);
        });
        
        // Handle visibility change (for mobile)
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible') {
                console.log('App is visible again');
                // Optionally refresh data
            }
        });
        
        // Prevent zoom on double tap for better mobile UX
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
        
        // Handle back button on Android
        let backButtonPressed = false;
        window.addEventListener('popstate', function() {
            if (!backButtonPressed) {
                backButtonPressed = true;
                // Try to go back in iframe history first
                try {
                    iframe.contentWindow.history.back();
                } catch (e) {
                    // If can't, confirm exit
                    if (confirm('Exit Sohojatri?')) {
                        // Allow default behavior
                    } else {
                        history.pushState(null, null, location.href);
                        backButtonPressed = false;
                    }
                }
                setTimeout(() => { backButtonPressed = false; }, 500);
            }
        });
        
        // Push initial state for back button handling
        history.pushState(null, null, location.href);
